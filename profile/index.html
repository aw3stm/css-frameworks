<!doctype html>
<html class="bg-brand h-full" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibely | Profile</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
  </head>
  <body class="text-main-text h-full">
    <nav class="bg-nav-bg text-main-text relative p-7">
      <div class="mx-auto flex max-w-4xl items-center justify-between">
        <button
          id="mobile-btn"
          class="z-10 block focus:outline-none md:hidden"
          aria-label="Toggle menu"
        >
          <span class="material-symbols-outlined text-3xl">menu</span>
        </button>
        <div class="z-10 ml-auto hidden items-center gap-8 md:flex">
          <a
            href="/feed/index.html"
            class="hover:text-brand-pink flex items-center transition-colors"
            aria-label="Feed"
          >
            <span class="material-symbols-outlined text-4xl">home</span>
          </a>
          <a
            href="/profile/index.html"
            class="hover:text-brand-pink flex items-center transition-colors"
            aria-label="Profile"
          >
            <span class="material-symbols-outlined text-4xl">person</span>
          </a>
          <button
            id="desktop-search-btn"
            class="hover:text-brand-pink flex cursor-pointer items-center transition-colors focus:outline-none"
            aria-label="Search"
          >
            <span class="material-symbols-outlined text-4xl">search</span>
          </button>

          <button
            id="desktop-create-btn"
            class="hover:text-brand-pink flex cursor-pointer items-center transition-colors focus:outline-none"
            aria-label="Create Post"
          >
            <span class="material-symbols-outlined text-4xl">edit_square</span>
          </button>

          <a
            href="/"
            class="hover:text-brand-pink flex items-center transition-colors"
            aria-label="Feed"
          >
            <span class="material-symbols-outlined text-4xl">logout</span>
          </a>
        </div>
      </div>
      <a
        href="/feed/index.html"
        class="absolute top-1/2 left-1/2 flex -translate-x-1/2 -translate-y-1/2 flex-col items-center"
      >
        <img
          src="/src/assets/Logo_Vibely.svg"
          alt="Vibely Logo"
          class="h-8 w-auto"
        />
      </a>
      <div
        id="mobile-menu"
        class="bg-nav-bg absolute top-full left-4 z-50 mt-2 hidden w-48 flex-col gap-4 rounded-lg p-4 shadow-xl md:hidden"
      >
        <a
          href="/feed/index.html"
          class="hover:text-brand-pink flex items-center gap-4 transition-colors"
        >
          <span class="material-symbols-outlined">home</span>Home
        </a>
        <a
          href="/profile/index.html"
          class="hover:text-brand-pink flex items-center gap-4 transition-colors"
        >
          <span class="material-symbols-outlined">person</span>Profile
        </a>
        <a
          href="/"
          class="hover:text-brand-pink flex items-center gap-4 transition-colors"
        >
          <span class="material-symbols-outlined">logout</span>Log out
        </a>
      </div>
    </nav>

    <main>
      <div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">
        <div class="sm:mx-auto sm:w-full sm:max-w-sm"></div>
      </div>
    </main>

    <nav
      class="bg-nav-bg fixed bottom-0 left-0 z-50 w-full border-t border-white md:hidden"
    >
      <div class="flex h-16 items-center justify-around">
        <a
          href="/feed/index.html"
          class="hover:text-brand-pink text-brand-pink flex h-full w-full items-center justify-center transition-colors"
          aria-label="Home"
        >
          <span class="material-symbols-outlined text-3xl">home</span>
        </a>

        <button
          id="create-btn"
          class="hover:text-brand-pink text-brand-pink flex h-full w-full items-center justify-center transition-colors"
        >
          <span class="material-symbols-outlined text-3xl">edit_square</span>
        </button>

        <button
          id="search-btn"
          class="hover:text-brand-pink text-brand-pink flex h-full w-full items-center justify-center transition-colors"
        >
          <span class="material-symbols-outlined text-3xl">search</span>
        </button>

        <a
          href="/profile/index.html"
          class="hover:text-brand-pink text-brand-pink flex h-full w-full items-center justify-center transition-colors"
          aria-label="Profile"
        >
          <span class="material-symbols-outlined text-3xl">person</span>
        </a>
      </div>
    </nav>

    <div
      id="create-post"
      class="fixed inset-0 z-60 hidden items-center justify-center bg-black/80 p-4"
    >
      <div
        class="bg-nav-bg relative w-full max-w-md rounded-lg border border-gray-500 p-6 shadow-2xl"
      >
        <button
          id="close-create-post"
          class="absolute top-4 right-4 text-gray-400 hover:text-white focus:outline-none"
        >
          <span class="material-symbols-outlined">close</span>
        </button>
        <h2 class="mb-4 text-xl font-bold text-white">Create New Post</h2>
        <form class="space-y-4">
          <div>
            <label class="mb-1 block text-sm font-medium text-gray-300"
              >Image URL</label
            >
            <input
              type="url"
              placeholder="https://..."
              class="bg-input-bg border-input-border focus:border-brand-pink w-full rounded border p-2 text-white outline-none"
            />

            <label class="mb-1 block text-sm font-medium text-gray-300"
              >Caption</label
            >
            <textarea
              rows="3"
              placeholder="What's on your mind?"
              class="bg-input-bg border-input-border focus:border-brand-pink w-full resize-none rounded border p-2 text-white outline-none"
            ></textarea>
          </div>
          <button
            type="button"
            class="bg-brand-pink hover:bg-pink-hover w-full rounded p-2 font-semibold text-white transition-colors"
          >
            Share Post
          </button>
        </form>
      </div>
    </div>

    <div
      id="search-bar"
      class="fixed inset-0 z-60 hidden items-center justify-center bg-black/80 p-4"
    >
      <div
        class="bg-nav-bg relative w-full max-w-md rounded-lg border border-gray-600 p-6 shadow-2xl"
      >
        <button
          id="close-search-btn"
          class="text-pink-hover absolute top-4 right-4 hover:text-white focus:outline-none"
        >
          <span class="material-symbols-outlined">close</span>
        </button>
        <h2 class="mb-4 text-xl font-bold text-white">Search posts</h2>
        <div class="space-y-4">
          <div class="relative">
            <span
              class="material-symbols-outlined absolute top-1/2 left-3 -translate-y-1/2 text-gray-400"
              >search</span
            >
            <input
              type="text"
              placeholder="Search users or posts"
              class="bg-input-bg border-input-border focus:border-brand-pink w-full rounded border py-2 pr-3 pl-10 text-black outline-none"
            />
          </div>

          <div>
            <label class="mb-1 block text-sm font-medium text-gray-300"
              >Sort by</label
            >
            <select
              class="bg-input-bg border-input-border focus:border-brand-pink w-full appearance-none rounded border p-2 text-gray-400 outline-none"
            >
              <option value="newest">Newest First</option>
              <option value="oldest">Oldest First</option>
              <option value="popular">Most Popular</option>
            </select>
          </div>
          <button
            type="button"
            class="bg-brand-pink hover:bg-pink-hover mt-2 w-full rounded p-2 font-semibold text-white transition-colors"
          >
            Show Results
          </button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
