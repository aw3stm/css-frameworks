<!doctype html>
<html class="bg-bg-brand min-h-screen" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibely | Sign in</title>

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="flex min-h-screen items-center justify-center px-4 py-12 font-sans text-gray-800 sm:px-6 lg:px-8"
  >
    <div
      class="w-full max-w-md rounded-3xl border border-gray-100 bg-white p-8 shadow-2xl sm:p-12"
    >
      <div class="mb-8 sm:mx-auto sm:w-full sm:max-w-sm">
        <img
          src="src/assets/Logo_Vibely.svg"
          alt="Your Company"
          class="mx-auto h-10 w-auto"
        />
      </div>

      <div id="login-section">
        <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
          <h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight">
            Sign in to your account
          </h2>
        </div>

        <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
          <form
            id="login-form"
            action="./feed/index.html"
            method="POST"
            class="space-y-6"
          >
            <div>
              <label for="email" class="text-mobile block font-medium"
                >Email</label
              >
              <div class="bg-input-bg border-input-border mt-2 rounded border">
                <input
                  id="email"
                  type="email"
                  name="email"
                  required
                  autocomplete="email"
                  class="focus:outline-brand-pink block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-gray-700 outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 sm:text-sm/6"
                />
              </div>
            </div>

            <div>
              <div class="flex items-center justify-between">
                <label for="password" class="text-mobile block font-medium"
                  >Password</label
                >
                <div class="text-sm">
                  <a
                    href="#"
                    class="text-mobile hover:text-green-hover font-semibold"
                    >Forgot password?</a
                  >
                </div>
              </div>
              <div class="bg-input-bg border-input-border mt-2 rounded border">
                <input
                  id="password"
                  type="password"
                  name="password"
                  required
                  minlength="8"
                  pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                  autocomplete="current-password"
                  class="focus:outline-brand-pink block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-gray-700 outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 sm:text-sm/6"
                />
              </div>
            </div>

            <div>
              <button
                type="submit"
                class="bg-brand-pink hover:bg-pink-hover focus-visible:outline-brand-pink flex w-full justify-center rounded-md px-3 py-1.5 text-sm/6 font-semibold text-white focus-visible:outline-2 focus-visible:outline-offset-2"
              >
                Sign in
              </button>
            </div>
          </form>

          <p class="text-mobile mt-10 text-center">
            Not a member?
            <button
              id="show-register-btn"
              type="button"
              class="text-brand-pink hover:text-green-hover font-semibold"
            >
              Register here
            </button>
          </p>
        </div>
      </div>
      <div id="register-section" class="hidden">
        <div class="sm:mx-auto sm:w-full sm:max-w-sm">
          <h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight">
            Create an account
          </h2>
        </div>

        <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
          <form
            id="register-form"
            action="./feed/index.html"
            method="POST"
            class="space-y-6"
          >
            <div>
              <label for="reg-name" class="text-mobile block font-medium">
                Full Name
              </label>
              <div class="bg-input-bg border-input-border mt-2 rounded border">
                <input
                  id="reg-name"
                  type="text"
                  name="name"
                  required
                  autocomplete="name"
                  class="focus:outline-brand-pink block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-gray-700 outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 sm:text-sm/6"
                />
              </div>
            </div>

            <div>
              <label for="reg-email" class="text-mobile block font-medium"
                >Email</label
              >
              <div class="bg-input-bg border-input-border mt-2 rounded border">
                <input
                  id="reg-email"
                  type="email"
                  name="email"
                  required
                  autocomplete="email"
                  class="focus:outline-brand-pink block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-gray-700 outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 sm:text-sm/6"
                />
              </div>
            </div>

            <div>
              <label for="reg-password" class="text-mobile block font-medium"
                >Choose a password</label
              >
              <div class="bg-input-bg border-input-border mt-2 rounded border">
                <input
                  id="reg-password"
                  type="password"
                  name="password"
                  required
                  minlength="8"
                  class="focus:outline-brand-pink block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-gray-700 outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 sm:text-sm/6"
                />
              </div>
            </div>

            <div>
              <label
                for="reg-password-twice"
                class="text-mobile block font-medium"
                >Repeat Password</label
              >
              <div class="bg-input-bg border-input-border mt-2 rounded border">
                <input
                  id="reg-password-twice"
                  type="password"
                  name="confirm-password"
                  required
                  minlength="8"
                  class="focus:outline-brand-pink block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-gray-700 outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 sm:text-sm/6"
                />
              </div>
            </div>

            <div>
              <button
                type="submit"
                class="bg-brand-pink hover:bg-pink-hover focus-visible:outline-brand-pink flex w-full justify-center rounded-md px-3 py-1.5 text-sm/6 font-semibold text-white focus-visible:outline-2 focus-visible:outline-offset-2"
              >
                Register
              </button>
            </div>
          </form>

          <p class="text-mobile mt-10 text-center">
            Already a member?
            <button
              id="show-login-btn"
              type="button"
              class="text-brand-pink hover:text-green-hover font-semibold"
            >
              Sign in here
            </button>
          </p>
        </div>
      </div>
    </div>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
